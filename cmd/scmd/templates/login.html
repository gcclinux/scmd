<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="SCMD — Secure login">
  <title>Login — SCMD {{.Version}}</title>
  <link rel="icon" href="scmd_icon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:      #0d0f14;
      --bg-surface:   #13161e;
      --bg-card:      rgba(255,255,255,0.04);
      --border:       rgba(255,255,255,0.08);
      --border-focus: rgba(99,179,237,0.6);
      --accent:       #63b3ed;
      --accent-glow:  rgba(99,179,237,0.25);
      --danger:       #fc8181;
      --text-primary: #e8eaf0;
      --text-muted:   #6b7280;
      --text-subtle:  #4b5563;
      --font-sans:    'Inter', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
      --radius:       12px;
      --radius-lg:    20px;
      --shadow:       0 8px 40px rgba(0,0,0,0.5);
      --transition:   0.2s ease;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* BG GLOW */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse at center, rgba(99,179,237,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* CARD */
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      box-shadow: var(--shadow);
    }

    /* LOGO AREA */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border-radius: 14px;
      background: rgba(99,179,237,0.1);
      border: 1px solid rgba(99,179,237,0.2);
      font-size: 1.6rem;
      margin-bottom: 16px;
    }
    .logo-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .logo-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* ERROR */
    .error-banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(252,129,129,0.08);
      border: 1px solid rgba(252,129,129,0.25);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 0.875rem;
      color: var(--danger);
      line-height: 1.5;
      animation: shake 0.35s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-4px); }
      75%      { transform: translateX(4px); }
    }

    /* FORM */
    .field-group { margin-bottom: 20px; }
    .field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .field-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 16px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .field-input::placeholder { color: var(--text-subtle); }
    .field-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* SUBMIT */
    .btn-login {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--bg-base);
      background: var(--accent);
      border: none;
      cursor: pointer;
      letter-spacing: 0.3px;
      margin-top: 8px;
      transition: all var(--transition);
      box-shadow: 0 2px 16px rgba(99,179,237,0.3);
      font-family: var(--font-sans);
    }
    .btn-login:hover {
      background: #90cdf4;
      box-shadow: 0 4px 24px rgba(99,179,237,0.45);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(0); }

    /* FOOTER NOTE */
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-subtle);
      line-height: 1.6;
    }
    .login-footer code {
      font-family: var(--font-mono);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* DIVIDER */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0 24px;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">⚡</div>
      <div class="logo-title">SCMD</div>
      <div class="logo-subtitle">v{{.Version}}</div>
    </div>

    {{if .Status}}
    <div class="error-banner">
      🔐 Authentication failed — invalid email or API key. Please try again.
    </div>
    {{end}}

    <form action="/login" method="post" autocomplete="off">
      <div class="field-group">
        <label class="field-label" for="email">Email Address</label>
        <input class="field-input" type="email" id="email" name="email"
          placeholder="user@example.com" required autofocus>
      </div>

      <div class="field-group">
        <label class="field-label" for="api_key">API Key</label>
        <input class="field-input" type="password" id="api_key" name="api_key"
          placeholder="••••••••••••••••" required>
      </div>

      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <hr class="divider">
    <div class="login-footer">
      Search Command — Command Knowledge Base<br>
      Need access? Contact your administrator.
    </div>
  </div>

</body>
</html>
